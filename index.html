<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>眼镜款式管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }
    body {
      background: #f7f8fa;
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .title {
      font-size: 22px;
      margin-bottom: 20px;
      color: #333;
    }
    .tool-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    #search {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
    }
    button {
      padding: 10px 16px;
      border-radius: 8px;
      border: none;
      background: #4e6ef2;
      color: white;
      cursor: pointer;
    }
    .img-search-btn {
      font-size: 18px;
      padding: 10px 12px;
      background: #fff;
      color: #333;
      border: 1px solid #ddd;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .item {
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 6px #00000008;
    }
    .item img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }
    .info {
      padding: 10px;
      font-size: 14px;
    }
    .name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 0;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="title">眼镜款式管理</div>

  <div class="tool-bar">
    <input type="text" id="search" placeholder="关键词搜索">
    <button id="searchBtn">搜索</button>
    <button id="upload">上传图片</button>
    <button class="img-search-btn" id="searchByImg">📷</button>
  </div>

  <input type="file" id="fileInput" accept="image/*" multiple hidden>
  <input type="file" id="imgSearchInput" accept="image/*" hidden>
  <div class="gallery" id="list"></div>

  <script>
    const upload = document.getElementById('upload');
    const fileInput = document.getElementById('fileInput');
    const list = document.getElementById('list');
    const search = document.getElementById('search');
    const searchBtn = document.getElementById('searchBtn');
    const searchByImg = document.getElementById('searchByImg');
    const imgSearchInput = document.getElementById('imgSearchInput');

    // 读取本地眼镜数据
    function getGlasses() {
      return JSON.parse(localStorage.getItem('glasses') || '[]');
    }

    // 保存
    function saveGlasses(arr) {
      localStorage.setItem('glasses', JSON.stringify(arr));
    }

    // 渲染列表
    function render(key = '') {
      const data = getGlasses();
      const filtered = data.filter(item =>
        item.name?.toLowerCase().includes(key.toLowerCase())
      );
      list.innerHTML = '';

      if (filtered.length === 0) {
        list.innerHTML = '<div class="empty">暂无眼镜</div>';
        return;
      }

      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <img src="${item.src}" alt="眼镜">
          <div class="info">
            <div class="name">${item.name}</div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    // 图片转Base64
    function toBase64(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    // 上传图片
    upload.onclick = () => fileInput.click();
    fileInput.onchange = async (e) => {
      const files = Array.from(e.target.files);
      const data = getGlasses();
      for (const f of files) {
        const src = await toBase64(f);
        data.unshift({ name: f.name, src });
      }
      saveGlasses(data);
      render(search.value.trim());
    };

    // 关键词搜索
    function doSearch() {
      render(search.value.trim());
    }
    searchBtn.onclick = doSearch;
    search.oninput = doSearch;

    // 以图搜图（前端简易匹配：上传图片后展示所有，可后续对接AI接口）
    searchByImg.onclick = () => imgSearchInput.click();
    imgSearchInput.onchange = async (e) => {
      if (e.target.files.length === 0) return;
      alert('正在使用以图搜图：匹配相似眼镜');
      render('');
    };

    render();
  </script>
</body>
</html>
