<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>眼镜款式管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "SF Pro Text", "Microsoft YaHei", sans-serif;
    }
    body {
      background: #f7f8fa;
      padding: 20px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .title {
      font-size: 22px;
      margin-bottom: 20px;
      color: #333;
      font-weight: 500;
    }

    /* 搜索框容器 */
    .search-wrapper {
      position: relative;
      flex: 1;
      min-width: 220px;
    }
    #search {
      width: 100%;
      height: 44px;
      padding: 0 44px 0 14px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    #search:focus {
      border-color: #ccc;
    }

    /* 苹果风格线性相机图标 */
    .camera-icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
      stroke: #999;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      cursor: pointer;
      transition: stroke 0.2s;
    }
    .camera-icon:hover {
      stroke: #333;
    }

    .tool-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    button {
      height: 44px;
      padding: 0 16px;
      border-radius: 12px;
      border: none;
      background: #fff;
      color: #333;
      border: 1px solid #e5e7eb;
      cursor: pointer;
      font-size: 15px;
    }
    button.primary {
      background: #007aff;
      color: #fff;
      border: none;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .item {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .item img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }
    .info {
      padding: 10px;
      font-size: 14px;
    }
    .name {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #333;
    }
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 60px 0;
      color: #999;
    }
    .tip {
      grid-column: 1/-1;
      text-align: center;
      padding: 30px 0;
      color: #666;
      font-size: 15px;
    }
  </style>
</head>

<body>
  <div class="title">眼镜款式管理</div>

  <div class="tool-bar">
    <div class="search-wrapper">
      <input type="text" id="search" placeholder="搜索眼镜名称">
      <!-- 苹果风格相机图标 -->
      <svg class="camera-icon" id="searchByImg" viewBox="0 0 24 24">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
      </svg>
    </div>
    <button id="searchBtn">搜索</button>
    <button class="primary" id="upload">上传图片</button>
  </div>

  <input type="file" id="fileInput" accept="image/*" multiple hidden>
  <input type="file" id="imgSearchInput" accept="image/*" hidden>
  <div class="gallery" id="list"></div>

  <script>
    const upload = document.getElementById('upload');
    const fileInput = document.getElementById('fileInput');
    const list = document.getElementById('list');
    const search = document.getElementById('search');
    const searchBtn = document.getElementById('searchBtn');
    const searchByImg = document.getElementById('searchByImg');
    const imgSearchInput = document.getElementById('imgSearchInput');

    // 读取本地数据
    function getGlasses() {
      return JSON.parse(localStorage.getItem('glasses') || '[]');
    }

    // 保存
    function saveGlasses(arr) {
      localStorage.setItem('glasses', JSON.stringify(arr));
    }

    // 正常渲染
    function render(key = '') {
      const data = getGlasses();
      const lowerKey = key.toLowerCase().trim();
      const filtered = data.filter(item =>
        item.name?.toLowerCase().includes(lowerKey)
      );

      list.innerHTML = '';
      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty">未找到相关眼镜</div>`;
        return;
      }
      filtered.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <img src="${item.src}" alt="眼镜">
          <div class="info">
            <div class="name">${item.name}</div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    // 以图搜图专用渲染
    function renderImageSearchResult(fileName) {
      const data = getGlasses();
      const key = fileName.split('.')[0].toLowerCase();
      const matched = data.filter(item =>
        item.name.toLowerCase().includes(key)
      );
      list.innerHTML = '';
      if (matched.length === 0) {
        list.innerHTML = `<div class="tip">未搜索到相似的眼镜款式</div>`;
        return;
      }
      matched.forEach(item => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `
          <img src="${item.src}" alt="眼镜">
          <div class="info">
            <div class="name">${item.name}</div>
          </div>
        `;
        list.appendChild(div);
      });
    }

    // 转Base64
    function toBase64(file) {
      return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
      });
    }

    // 上传
    upload.onclick = () => fileInput.click();
    fileInput.onchange = async (e) => {
      const files = Array.from(e.target.files);
      const data = getGlasses();
      for (const f of files) {
        const src = await toBase64(f);
        data.unshift({ name: f.name, src });
      }
      saveGlasses(data);
      render(search.value.trim());
    };

    // 关键词搜索
    function doSearch() {
      render(search.value.trim());
    }
    searchBtn.onclick = doSearch;
    search.oninput = doSearch;

    // 以图搜图（根据文件名匹配）
    searchByImg.onclick = () => imgSearchInput.click();
    imgSearchInput.onchange = (e) => {
      const file = e.target.files[0];
      if (!file) return;
      renderImageSearchResult(file.name);
    };

    render();
  </script>
</body>
</html>
