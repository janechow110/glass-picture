<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>眼镜款式管理</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "SF Pro Text", "Microsoft YaHei", sans-serif;
    }
    body {
      background: #f7f8fa;
      padding: 0;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }
    .title {
      font-size: 22px;
      margin-bottom: 16px;
      color: #333;
      font-weight: 500;
    }

    /* 搜索框 */
    .search-group {
      position: relative;
      margin-bottom: 14px;
    }
    #search {
      width: 100%;
      height: 46px;
      padding: 0 50px 0 16px;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    #search:focus {
      border-color: #007aff;
    }

    /* 以图搜图图标（搜索框内） */
    .camera-btn {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 22px;
      height: 22px;
      stroke: #888;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      cursor: pointer;
    }
    .camera-btn:hover {
      stroke: #007aff;
    }

    /* 工具栏 */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .category {
      display: flex;
      gap: 10px;
      flex: 1;
      flex-wrap: wrap;
    }
    .tag {
      padding: 8px 14px;
      border-radius: 10px;
      background: #fff;
      border: 1px solid #e5e7eb;
      font-size: 14px;
      cursor: pointer;
    }
    .tag.active {
      background: #007aff;
      color: #fff;
      border-color: #007aff;
    }
    #uploadBtn {
      padding: 0 18px;
      height: 42px;
      border-radius: 10px;
      background: #007aff;
      color: #fff;
      border: none;
      cursor: pointer;
    }

    /* 网格 */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 14px;
    }
    .card {
      background: #fff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    }
    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }
    .card .name {
      padding: 10px;
      font-size: 14px;
      color: #333;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 无结果提示 */
    .no-result {
      grid-column: 1/-1;
      text-align: center;
      padding: 40px 0;
      color: #ff4d4f;
      font-size: 14px;
    }
    .empty {
      grid-column: 1/-1;
      text-align: center;
      padding: 50px 0;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="title">眼镜款式管理</div>

    <div class="search-group">
      <input type="text" id="search" placeholder="搜索眼镜名称">
      <svg class="camera-btn" id="searchByImg" viewBox="0 0 24 24">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
        <circle cx="12" cy="13" r="4"></circle>
      </svg>
    </div>

    <div class="toolbar">
      <div class="category">
        <div class="tag active" data-cate="all">All</div>
        <div class="tag" data-cate="product">Product</div>
        <div class="tag" data-cate="help">Help</div>
      </div>
      <button id="uploadBtn">上传图片</button>
    </div>

    <div class="grid" id="list"></div>
  </div>

  <input type="file" id="fileInput" accept="image/*" multiple hidden>
  <input type="file" id="imgSearchInput" accept="image/*" hidden>

  <script>
    const search = document.getElementById('search');
    const searchByImg = document.getElementById('searchByImg');
    const uploadBtn = document.getElementById('uploadBtn');
    const fileInput = document.getElementById('fileInput');
    const imgSearchInput = document.getElementById('imgSearchInput');
    const list = document.getElementById('list');
    const tags = document.querySelectorAll('.tag');

    let currentCate = 'all';
    let currentKeyword = '';

    // 读取
    function getAll() {
      return JSON.parse(localStorage.getItem('glasses') || '[]');
    }

    // 保存
    function save(arr) {
      localStorage.setItem('glasses', JSON.stringify(arr));
    }

    // 渲染
    function render() {
      const data = getAll();
      const keyword = currentKeyword.toLowerCase().trim();
      
      let filtered = data;

      // 类目筛选
      if (currentCate !== 'all') {
        filtered = filtered.filter(item => item.type === currentCate);
      }

      // 关键词搜索
      if (keyword) {
        filtered = filtered.filter(item =>
          item.name?.toLowerCase().includes(keyword)
        );
      }

      list.innerHTML = '';
      if (data.length === 0) {
        list.innerHTML = '<div class="empty">暂无眼镜，可上传</div>';
        return;
      }
      if (filtered.length === 0) {
        list.innerHTML = `<div class="no-result">未找到：${currentKeyword}</div>`;
        return;
      }

      filtered.forEach(item => {
        const c = document.createElement('div');
        c.className = 'card';
        c.innerHTML = `
          <img src="${item.src}" alt="">
          <div class="name">${item.name}</div>
        `;
        list.appendChild(c);
      });
    }

    // 转Base64
    function toBase64(file) {
      return new Promise(res => {
        const r = new FileReader();
        r.onload = e => res(e.target.result);
        r.readAsDataURL(file);
      });
    }

    // 上传
    uploadBtn.onclick = () => fileInput.click();
    fileInput.onchange = async e => {
      const files = Array.from(e.target.files);
      const data = getAll();
      for (const f of files) {
        const src = await toBase64(f);
        data.unshift({
          name: f.name,
          src: src,
          type: "product"
        });
      }
      save(data);
      render();
    };

    // 搜索
    search.oninput = () => {
      currentKeyword = search.value;
      render();
    };

    // 类目切换
    tags.forEach(t => {
      t.onclick = () => {
        tags.forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        currentCate = t.dataset.cate;
        render();
      };
    });

    // 以图搜图
    searchByImg.onclick = () => imgSearchInput.click();
    imgSearchInput.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;
      currentKeyword = file.name.split('.')[0];
      search.value = currentKeyword;
      render();
    };

    render();
  </script>
</body>
</html>
